<div class="camping-layout">
    <!-- Simple Sidebar -->

    <!-- Main Content Area -->
    <main class="camping-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <h1 class="page-title">{{ pageTitle }}</h1>
                <span class="live-badge">🟢 En direct</span>
            </div>
            <div class="top-bar-right">
                <button class="notification-btn" title="Notifications" (click)="toggleNotifications()">
                    🔔
                    <span class="notification-badge" *ngIf="notificationCount > 0">{{ notificationCount }}</span>
                </button>

                <!-- Notification Dropdown -->
                <div class="notification-overlay" *ngIf="showNotifications" (click)="toggleNotifications()"></div>
                <div class="notification-dropdown glass-panel" *ngIf="showNotifications">
                    <div class="dropdown-header">
                        <h3>Notifications</h3>
                        <button class="btn-text" (click)="markAllAsRead()">Tout lire</button>
                    </div>
                    <div class="notification-list">
                        <div class="notif-item" [class.unread]="!n.isRead" *ngFor="let n of notifications.slice(0, displayCount)"  (click)="markAsRead(n.notificationId, n.reservationId)">
                            <div class="notif-icon">
                                {{ n.type === 'payment' ? '💰' : (n.type === 'system' ? '🛠️' : '📅') }}
                            </div>
                            <div class="notif-content">
                                <p class="notif-title">{{ n.title }}</p>
                                <p class="notif-msg">{{ n.message }}</p>
                                <span class="notif-time">{{ n.createdAt | date:'short' }}</span>
                            </div>
                            <div class="unread-dot" *ngIf="!n.isRead"></div>
                        </div>
                        <div class="empty-notif" *ngIf="notifications.length === 0">
                            Aucune nouvelle notification
                        </div>
                        <button class="btn-voir-plus" 
                                *ngIf="displayCount < notifications.length"
                                (click)="showMore()">
                            Voir plus
                        </button>
                        <p class="all-loaded"
                        *ngIf="notifications.length > 0 && displayCount >= notifications.length">
                            Toutes les notifications sont affichées
                        </p>
                    </div>
                </div>

                <div class="user-chip">
                    <span class="user-avatar">🏕️</span>
                    <span class="user-name">{{ userName }}</span>
                </div>

                <button class="btn-deconnexion" (click)="handleLogout()" title="Déconnexion">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Déconnexion
                </button>
            </div>
        </header>

        <!-- Page Content -->
        <div class="page-content">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
